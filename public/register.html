<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - EstoquePro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

  <div class="card-auth">
    <a href="#" class="brand-logo text-success">
      <i class="bi bi-person-plus me-2"></i> EstoquePro
    </a>
    <div class="text-center mb-4">
      <h4 class="fw-bold mb-1">Criar Conta</h4>
      <p class="text-muted small">Cadastre-se para começar a contagem</p>
    </div>
    <form method="POST" action="/register">
      <div class="mb-3">
        <label class="form-label small fw-bold text-uppercase">Novo Usuário</label>
        <input type="text" name="username" class="form-control" placeholder="Escolha um nome" required>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-bold text-uppercase">Senha</label>
        <input type="password" name="password" class="form-control" placeholder="Senha com no mínimo 6 caracteres"
          required>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">Finalizar Cadastro</button>
    </form>
    <div class="text-center mt-4">
      <a href="/login.html" class="text-decoration-none small">
        Já possui acesso? <span class="text-success fw-bold">Fazer Login</span>
      </a>
    </div>
  </div>

  <script src="acessibilidade.js"></script>
  <script src="screenreader.js"></script>
</body>

</html>
