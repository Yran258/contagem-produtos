<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstoquePro - Dashboard Analytics</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-custom mb-4 py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center fw-bold text-primary" href="/dashboard.html">
        <i class="bi bi-graph-up-arrow me-2 fs-4"></i> Dashboard
      </a>

      <div class="d-flex align-items-center gap-2">
        <div class="d-flex align-items-center gap-1 me-3 border-end pe-3">
          <button class="btn btn-sm btn-light text-primary fw-bold IgnoreReader" onclick="mudarFonte(-1)"
            title="Diminuir texto">A-</button>
          <button class="btn btn-sm btn-light text-primary fw-bold IgnoreReader" onclick="mudarFonte(1)"
            title="Aumentar texto">A+</button>
          <button class="btn btn-sm btn-light text-primary ms-1 IgnoreReader" onclick="toggleTema()" title="Alternar Tema">
            <i id="icone-tema" class="bi bi-moon-stars"></i>
          </button>
        </div>

        <a href="/" class="btn btn-outline-secondary border-0 fw-bold">Voltar ao Início</a>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    <div class="row g-4 mb-4">
      <div class="col-md-6">
        <div class="card card-custom kpi-card p-4 bg-primary text-white border-0 shadow-sm">
          <i class="bi bi-box-seam kpi-icon"></i>
          <p class="text-white-50 fw-bold mb-1 small text-uppercase">Produtos Cadastrados</p>
          <h2 id="totalProdutos" class="fw-bold display-5 mb-0 isIgnoreCache">0</h2>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card card-custom kpi-card p-4 bg-success text-white border-0 shadow-sm">
          <i class="bi bi-upc-scan kpi-icon"></i>
          <p class="text-white-50 fw-bold mb-1 small text-uppercase">Unidades Contadas</p>
          <h2 id="totalUnidades" class="fw-bold display-5 mb-0 isIgnoreCache">0</h2>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card card-custom p-4 h-100">
          <h6 class="fw-bold text-muted mb-4 text-uppercase small">Top 10 Produtos por Quantidade</h6>
          <div class="grafico-box">
            <canvas id="graficoTop10" aria-label="Texto não encontrado"></canvas>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card card-custom p-4 h-100">
          <h6 class="fw-bold text-muted mb-4 text-uppercase small">Cadastros (Últimos 7 dias)</h6>
          <div class="grafico-box">
            <canvas id="grafico7dias" aria-label="Texto não encontrado"></canvas>
          </div>
        </div>
      </div>

      <div class="col-md-12">
        <div class="card card-custom p-4">
          <h6 class="fw-bold text-muted mb-4 text-uppercase small">Distribuição de Unidades por Setor</h6>
          <div class="grafico-box">
            <canvas id="graficoSetores" aria-label="Texto não encontrado"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="acessibilidade.js"></script>
  <script src="screenreader.js"></script>

  <script>
    // Gerenciamento de Gráficos
    let graficosAtivos = [];

    // Função para capturar as cores atuais das variáveis CSS
    function obterCoresTema() {
      const estilo = getComputedStyle(document.documentElement);
      return {
        texto: estilo.getPropertyValue('--text-muted').trim() || '#64748b',
        grade: estilo.getPropertyValue('--border-color').trim() || '#e2e8f0',
        primaria: estilo.getPropertyValue('--primary').trim() || '#0d6efd'
      };
    }

    // Função para atualizar todos os gráficos quando o tema mudar
    function atualizarCoresDosGraficos() {
      const cores = obterCoresTema();
      graficosAtivos.forEach(chart => {
        chart.options.scales.x.grid.color = cores.grade;
        chart.options.scales.x.ticks.color = cores.texto;
        chart.options.scales.y.grid.color = cores.grade;
        chart.options.scales.y.ticks.color = cores.texto;
        chart.update();
      });
    }

    // Escuta o evento customizado disparado pelo acessibilidade.js
    window.addEventListener('temaAlterado', atualizarCoresDosGraficos);

    // Função auxiliar para fetch (idêntica à sua original)
    async function buscarJson(url, fallback = []) {
      try {
        const res = await fetch(url);
        if (res.status === 401) return window.location.href = "/login.html";
        return res.ok ? await res.json() : fallback;
      } catch (error) {
        console.error("Erro:", error);
        return fallback;
      }
    }

    async function carregarDashboard() {
      const resumo = await buscarJson("/api/analytics/resumo", { total_produtos: 0, total_unidades: 0 });
      document.getElementById("totalProdutos").innerText = resumo.total_produtos;
      document.getElementById("totalUnidades").innerText = resumo.total_unidades;

      const cores = obterCoresTema();

      // Configuração base de escalas para reaproveitamento
      const configEscalas = {
        y: {
          grid: { color: cores.grade, drawBorder: false },
          ticks: { color: cores.texto, font: { family: 'Inter' } }
        },
        x: {
          grid: { display: false },
          ticks: { color: cores.texto, font: { family: 'Inter' } }
        }
      };

      // 1. Gráfico Top 10
      const top10Data = await buscarJson("/api/analytics/top10", []);

      document.getElementById('graficoTop10').innerText = JSON.stringify(top10Data);

      const gTop10 = new Chart(document.getElementById("graficoTop10"), {
        type: "bar",
        data: {
          labels: top10Data.map(p => p.descricao),
          datasets: [{
            label: "Total",
            data: top10Data.map(p => p.total),
            backgroundColor: cores.primaria,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: configEscalas
        }
      });
      graficosAtivos.push(gTop10);

      // 2. Gráfico 7 Dias
      const diasData = await buscarJson("/api/analytics/7dias", []);
      document.getElementById("grafico7dias").innerText = JSON.stringify(diasData);

      const g7Dias = new Chart(document.getElementById("grafico7dias"), {
        type: "line",
        data: {
          labels: diasData.map(d => d.dia),
          datasets: [{
            label: "Unidades",
            data: diasData.map(d => d.total),
            borderColor: cores.primaria,
            tension: 0.4,
            fill: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: configEscalas
        }
      });
      graficosAtivos.push(g7Dias);

      // 3. Gráfico por Setor
      const setoresData = await buscarJson("/api/analytics/setores", []);
      document.getElementById("graficoSetores").innerText = JSON.stringify(setoresData)
      const gSetores = new Chart(document.getElementById("graficoSetores"), {
        type: "bar",
        data: {
          labels: setoresData.map(s => s.setor || "Sem setor"),
          datasets: [{
            label: "Unidades",
            data: setoresData.map(s => s.total_unidades),
            backgroundColor: '#198754', // Cor fixa verde para sucesso
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: configEscalas
        }
      });
      graficosAtivos.push(gSetores);
    }

    carregarDashboard();
  </script>
</body>

</html>
