<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard - Análise de Dados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>📊 Dashboard - Análise de Dados</h2>
    <div>
      <a href="/" class="btn btn-outline-primary btn-sm">Voltar</a>
      <a href="/logout" class="btn btn-secondary btn-sm">Sair</a>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm p-3">
        <h5>Total de produtos cadastrados</h5>
        <h2 id="totalProdutos">0</h2>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card shadow-sm p-3">
        <h5>Total de unidades contadas</h5>
        <h2 id="totalUnidades">0</h2>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <div class="card shadow-sm p-3">
        <h5>Top 10 produtos por quantidade</h5>
        <canvas id="graficoTop10"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm p-3">
        <h5>Últimos 7 dias (unidades cadastradas)</h5>
        <canvas id="grafico7dias"></canvas>
      </div>
    </div>

    <div class="col-md-12">
      <div class="card shadow-sm p-3">
        <h5>Quantidade por setor</h5>
        <canvas id="graficoSetores"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
async function carregarDashboard() {
  // Resumo
  const resumoRes = await fetch("/api/analytics/resumo");
  if (resumoRes.status === 401) {
    window.location.href = "/login.html";
    return;
  }

  const resumo = await resumoRes.json();
  document.getElementById("totalProdutos").innerText = resumo.total_produtos || 0;
  document.getElementById("totalUnidades").innerText = resumo.total_unidades || 0;

  // Top 10
  const topRes = await fetch("/api/analytics/top10");
  const top10 = await topRes.json();

  new Chart(document.getElementById("graficoTop10"), {
    type: "bar",
    data: {
      labels: top10.map(p => p.descricao),
      datasets: [{
        label: "Total",
        data: top10.map(p => p.total)
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: true
        }
      }
    }
  });

  // Últimos 7 dias
  const diasRes = await fetch("/api/analytics/7dias");
  const dias = await diasRes.json();

  const hoje = new Date();
  const mapa = {};
  dias.forEach(d => mapa[d.dia] = d.total);

  const labels = [];
  const valores = [];

  for (let i = 6; i >= 0; i--) {
    const dt = new Date(hoje);
    dt.setDate(hoje.getDate() - i);
    const key = dt.toISOString().slice(0, 10);
    labels.push(key);
    valores.push(mapa[key] || 0);
  }

  new Chart(document.getElementById("grafico7dias"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Unidades",
        data: valores,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: true
        }
      }
    }
  });

  // Quantidade por setor
  const setoresRes = await fetch("/api/analytics/setores");
  const setores = await setoresRes.json();

  new Chart(document.getElementById("graficoSetores"), {
    type: "bar",
    data: {
      labels: setores.map(s => s.setor || "Sem setor"),
      datasets: [{
        label: "Unidades por setor",
        data: setores.map(s => s.total_unidades)
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: true
        }
      }
    }
  });
}

carregarDashboard();
</script>

</body>
</html>
