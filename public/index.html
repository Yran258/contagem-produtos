<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contagem de Produtos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <img src="/logo.png" 
     style="
        position: fixed;
        top: 20px;
        left: 20px;
        height: 90px;
        z-index: 999;
     ">

<div class="container mt-5">
<div class="card shadow p-4">

<h2 class="mb-4 text-center">📦 Contagem de Produtos</h2>

<div class="text-end mb-3">
<a href="/dashboard.html" class="btn btn-outline-primary btn-sm me-2">Dashboard</a>
<a href="/logout" class="btn btn-secondary btn-sm">Sair</a>
</div>

<form id="form" class="row g-3">
<div class="col-md-2">
<label class="form-label">Código</label>
<input id="codigo" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Descrição</label>
<input id="descricao" class="form-control" required>
</div>

<div class="col-md-2">
<label class="form-label">Quantidade</label>
<input id="quantidade" type="number" class="form-control" required>
</div>

<div class="col-md-2">
<label class="form-label">Setor</label>
<input id="setor" class="form-control" required>
</div>

<div class="col-md-2 d-flex align-items-end">
<button class="btn btn-primary w-100" type="submit">
Cadastrar
</button>
</div>
</form>

<hr class="my-4">

<div class="d-flex justify-content-between align-items-center">
  <h4 class="mb-0">Produtos Cadastrados</h4>
  <button onclick="exportar()" class="btn btn-success">
    Gerar Excel
  </button>
</div>

<br>

<div class="table-responsive">
<table class="table table-striped table-bordered">
<thead class="table-dark">
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Quantidade</th>
<th>Setor</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>
</div>

<script>
document.getElementById("codigo").addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();

    const codigo = document.getElementById("codigo").value.trim();
    if (!codigo) return;

    const res = await fetch("/api/buscar/" + encodeURIComponent(codigo));
    if (res.status === 401) {
      window.location.href = "/login.html";
      return;
    }

    const data = await res.json();
    if (data.encontrado) {
      document.getElementById("descricao").value = data.descricao;
      document.getElementById("setor").value = data.setor || "";
      document.getElementById("quantidade").focus();
    } else {
      alert("Código não encontrado na base.");
      document.getElementById("descricao").value = "";
    }
  }
});

async function carregar() {
  const res = await fetch('/api/produtos');

  if (res.status === 401) {
    window.location.href = '/login.html';
    return;
  }

  const produtos = await res.json();
  const tabela = document.getElementById('tabela');
  tabela.innerHTML = '';

  produtos.forEach(p => {
    tabela.innerHTML += `
<tr>
<td>${p.codigo}</td>
<td>${p.descricao}</td>
<td>${p.quantidade}</td>
<td>${p.setor || ""}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="excluir(${p.id})">
Excluir
</button>
</td>
</tr>
`;
  });
}

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();

  await fetch('/api/produtos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      codigo: document.getElementById('codigo').value,
      descricao: document.getElementById('descricao').value,
      quantidade: document.getElementById('quantidade').value,
      setor: document.getElementById('setor').value
    })
  });

  document.getElementById('form').reset();
  carregar();
});

async function excluir(id) {
  if (confirm("Tem certeza que deseja excluir este produto?")) {
    await fetch('/api/produtos/' + id, { method: 'DELETE' });
    carregar();
  }
}

function exportar() {
  window.location.href = '/api/exportar';
}

carregar();
</script>

</body>
</html>
