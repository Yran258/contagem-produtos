<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EstoquePro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">

  <style>
    .logo-img {
      width: 40px;
      height: auto;
    }
  </style>
</head>

<body class="auth-page">

  <div class="card-auth">
    <a href="#" class="brand-logo text-primary d-flex align-items-center justify-content-center">
      <img src="logo.png" alt="Logo" class="logo-img me-2">
      EstoquePro
    </a>

    <div class="text-center mb-4">
      <h4 class="fw-bold mb-1">Bem-vindo</h4>
      <p class="text-muted small">Gerencie seu estoque com eficiência</p>
    </div>

    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label small fw-bold text-uppercase">Usuário</label>
        <input type="text" name="username" class="form-control" placeholder="Seu nome de usuário" required>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-bold text-uppercase">Senha</label>
        <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Entrar</button>
    </form>

    <div class="text-center mt-4">
      <a href="/register.html" class="text-decoration-none small">
        Não tem conta? <span class="text-primary fw-bold">Criar agora</span>
      </a>
    </div>
  </div>

  <script src="acessibilidade.js"></script>
  <script src="screenreader.js"></script>
</body>

</html>
